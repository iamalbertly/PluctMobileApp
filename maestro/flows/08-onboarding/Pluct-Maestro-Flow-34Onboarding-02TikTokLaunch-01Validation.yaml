appId: app.pluct
---
# Pluct-Maestro-Flow-34Onboarding-02TikTokLaunch-01Validation.yaml
# Validates the "Open TikTok" button in tutorial Step 3
#
# Test Flow:
# 1. Clear app data
# 2. Launch app and progress to tutorial Step 3
# 3. Tap "Open TikTok" button
# 4. Verify TikTok app or Play Store opens (app leaves foreground)
# 5. Return to Pluct (verify tutorial completed state)

- clearState
- launchApp
- waitForAnimationToEnd

# Dismiss welcome dialog
- tapOn:
    text: "Get Started"
    optional: true
- waitForAnimationToEnd

# Skip permission dialogs
- tapOn:
    text: "Skip"
    optional: true
- waitForAnimationToEnd:
    timeout: 1500
- tapOn:
    text: "Skip"
    optional: true
- waitForAnimationToEnd:
    timeout: 1500

# Progress through tutorial to Step 3
- tapOn:
    text: "Next"
    optional: true
- waitForAnimationToEnd:
    timeout: 1500
- tapOn:
    text: "Got It"
    optional: true
- waitForAnimationToEnd:
    timeout: 1500

# Verify Step 3 is visible with Open TikTok button
- assertVisible:
    text: "Open TikTok"
    optional: true

# Tap Open TikTok (will open TikTok or Play Store)
- tapOn:
    text: "Open TikTok"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

# Note: At this point TikTok or Play Store opens
# The test validates the button tap works
# Manual verification confirms TikTok opens correctly
