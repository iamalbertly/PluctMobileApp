appId: app.pluct
---
# Pluct-Maestro-Flow-33Onboarding-01Tutorial-01Validation.yaml
# Validates onboarding tutorial flow with 3-step walkthrough
#
# Test Flow:
# 1. Clear app data (first-time user simulation)
# 2. Launch app
# 3. Step 1: Verify "Get Transcripts in 3 Taps" → Tap Next
# 4. Step 2: Verify "Find the Share Button" → Tap Got It
# 5. Step 3: Verify "Ready to Try?" → Skip with "I'll Figure It Out"
# 6. Verify home screen shows with credits

- clearState
- launchApp
- waitForAnimationToEnd

# Step 1: How It Works
- extendedWaitUntil:
    visible:
      text: "Get Transcripts in 3 Taps"
    timeout: 10000
    optional: true

- assertVisible:
    text: "free transcriptions"
    optional: true

- tapOn:
    text: "Next"
    optional: true
- waitForAnimationToEnd:
    timeout: 1500

# Step 2: Visual Instructions
- extendedWaitUntil:
    visible:
      text: "Find the Share Button"
    timeout: 5000
    optional: true

- tapOn:
    text: "Got It"
    optional: true
- waitForAnimationToEnd:
    timeout: 1500

# Step 3: Open TikTok
- extendedWaitUntil:
    visible:
      text: "Ready to Try?"
    timeout: 5000
    optional: true

# Skip tutorial
- tapOn:
    text: "I'll Figure It Out"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000

# Verify home screen is visible (app functional after tutorial)
- extendedWaitUntil:
    visible:
      text: ".*credits.*"
    timeout: 5000
    optional: true

- assertVisible:
    text: "Pluct"
    optional: true
