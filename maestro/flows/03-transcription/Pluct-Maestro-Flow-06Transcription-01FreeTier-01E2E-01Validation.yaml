appId: app.pluct
---
# Pluct-Maestro-Flow-06Transcription-01FreeTier-01E2E-01Validation.yaml
# Complete free tier E2E validation

- launchApp
- waitForAnimationToEnd
- assertVisible:
    text: "free extractions remaining"
    optional: true
- tapOn:
    id: "url_input_field"
    optional: true
- tapOn:
    text: "Paste TikTok Link"
    optional: true
- inputText: "https://vt.tiktok.com/ZSaMj8uAJ/"
- waitForAnimationToEnd:
    timeout: 2000
# Wait for inline submit button to appear (Send icon inside input field)
- extendedWaitUntil:
    visible:
      id: "extract_script_button"
    timeout: 10000
# Credit badge shows "Free (X)" instead of button text "FREE"
- assertVisible:
    text: "Free"
    optional: true
- tapOn:
    id: "extract_script_button"
- waitForAnimationToEnd
- assertVisible:
    id: "processing_indicator"
    optional: true
# Script execution removed - use adb logcat monitoring instead
- waitForAnimationToEnd:
    timeout: 160000
- assertVisible:
    text: "transcript"
    optional: true
- assertVisible:
    text: "Completed"
    optional: true
