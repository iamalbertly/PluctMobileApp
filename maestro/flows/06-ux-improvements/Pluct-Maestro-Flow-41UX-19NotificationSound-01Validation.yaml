appId: app.pluct
---
# Pluct-Maestro-Flow-41UX-19NotificationSound-01Validation.yaml
# UX FIX #1: Validates notification sound, vibration, and icon on completion
# Tests that user gets audible+haptic feedback when transcription completes

- launchApp
- waitForAnimationToEnd

# Navigate to a quick transcription test
- tapOn:
    id: "url_input_field"
- inputText: "https://vm.tiktok.com/ZMJthGtAS/"
- waitForAnimationToEnd

# Start transcription
- assertVisible:
    id: "extract_script_button"
- tapOn:
    id: "extract_script_button"

# Wait for processing indicator to appear
- waitForAnimationToEnd
- assertVisible:
    id: "processing_indicator"
    optional: true

# UX FIX #3: Verify progress logging in logcat (via adb logcat filter)
# PROGRESS[XX%] format should appear incrementally

# Wait for completion (max 3 minutes for this test)
- waitForAnimationToEnd:
    timeout: 180000

# Verify completion state - either transcript visible or completion indicator
- assertVisible:
    text: "Completed"
    optional: true
- assertVisible:
    text: "transcript"
    optional: true

# Note: Sound/vibration cannot be validated by Maestro directly
# Manual verification: notification should play sound and vibrate on completion
# Notification icon should be visible (ic_launcher_foreground monochrome)
