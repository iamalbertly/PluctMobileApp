appId: app.pluct
---
# Pluct-Maestro-Flow-26UX-12ErrorRecovery-01Validation.yaml
# Validates UX Improvement #1: Error recovery guidance with specific next steps
# Follows naming: [Project]-[Maestro]-[Flow]-[Category]-[Feature]-[Sequence][Validation]

- launchApp
- waitForAnimationToEnd

# Trigger an error (invalid URL scenario)
- tapOn:
    id: "url_input_field"
- inputText: "invalid-url-test"
- waitForAnimationToEnd
- tapOn:
    id: "extract_script_button"
- waitForAnimationToEnd

# Verify error message appears with recovery actions
- assertVisible:
    text: "Invalid"
    optional: true
- assertVisible:
    text: "Retry"
    optional: true
