appId: app.pluct
---
# Pluct-Maestro-Flow-24UX-10QueueFeedback-01Validation.yaml
# Validates UX Improvement #4: Immediate feedback when video is queued
# Follows naming: [Project]-[Maestro]-[Flow]-[Category]-[Feature]-[Sequence][Validation]

- launchApp
- waitForAnimationToEnd

# Wait for UI to be ready
- assertVisible:
    text: "Pluct"
    optional: true

# Note: Network disabling requires adb commands which Maestro doesn't support directly
# This test validates the queue feedback message structure
# In practice, network would be disabled via adb before running this test

- tapOn:
    id: "url_input_field"
- inputText: "https://vm.tiktok.com/ZMA730880/"
- waitForAnimationToEnd
- assertVisible:
    id: "extract_script_button"
- tapOn:
    id: "extract_script_button"
- waitForAnimationToEnd

# Verify processing started (queue feedback would appear if network unavailable)
- assertVisible:
    text: "Processing"
    optional: true
