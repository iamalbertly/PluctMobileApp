appId: app.pluct
---
# Pluct-Maestro-Flow-25UX-11TimeoutGuidance-01Validation.yaml
# Validates UX Improvement #5: Helpful guidance when transcription takes longer
# Follows naming: [Project]-[Maestro]-[Flow]-[Category]-[Feature]-[Sequence][Validation]

- launchApp
- waitForAnimationToEnd

# Start a transcription
- tapOn:
    id: "url_input_field"
- inputText: "https://vm.tiktok.com/ZMA730880/"
- waitForAnimationToEnd
- tapOn:
    id: "extract_script_button"
- waitForAnimationToEnd

# Wait for processing to start
- waitForAnimationToEnd

# Note: Timeout warning only appears after extended processing time
# This test validates the UI structure, actual timeout requires long-running transcription
- assertVisible:
    text: "Processing"
    optional: true
