appId: app.pluct
---
# Pluct-Maestro-Flow-29UX-15QueueActions-01Validation.yaml
# Validates UX Improvement #1: Immediate feedback for queue item actions
# Follows naming: [Project]-[Maestro]-[Flow]-[Category]-[Feature]-[Sequence][Validation]

- launchApp
- waitForAnimationToEnd

# Wait for UI to be ready
- assertVisible:
    text: "Pluct"
    optional: true

# Note: This test requires a queued video to exist
# In practice, queue a video first, then test retry/remove actions
# For validation, we check that queue section exists and actions are available

- assertVisible:
    text: "queued"
    optional: true
- assertVisible:
    text: "Retry"
    optional: true
- assertVisible:
    text: "Remove"
    optional: true
