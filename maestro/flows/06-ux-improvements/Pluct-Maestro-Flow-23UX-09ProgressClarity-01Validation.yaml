appId: app.pluct
---
# Pluct-Maestro-Flow-23UX-09ProgressClarity-01Validation.yaml
# Validates UX Improvement #2: Clearer progress phase descriptions
# Follows naming: [Project]-[Maestro]-[Flow]-[Category]-[Feature]-[Sequence][Validation]

- launchApp
- waitForAnimationToEnd

# Wait for UI to be ready
- assertVisible:
    text: "Pluct"
    optional: true

# Start a transcription to see progress indicator
- tapOn:
    id: "url_input_field"
- inputText: "https://vm.tiktok.com/ZMA730880/"
- waitForAnimationToEnd
- assertVisible:
    id: "extract_script_button"
- tapOn:
    id: "extract_script_button"
- waitForAnimationToEnd

# Verify progress indicator appears with clear information
- assertVisible:
    text: "Processing"
    optional: true
