appId: app.pluct
---
# Error Categorization Consistency Validation
# Validates that error categorization is consistent across all error paths.
# This ensures users see the same recovery actions for the same error types.
# Expected behavior:
# - Network errors show "Check Connection" + "Retry"
# - Auth errors show "Retry" (token auto-refresh)
# - Rate limit errors show "Retry Later"
# - Credit errors show "Add Credits"
# - Validation errors show "Fix Input" or "Retry"

- launchApp
- waitForAnimationToEnd
# 1. Navigate to capture screen and verify error handling UI exists
- tapOn:
    id: "url_input_field"
    optional: true
- tapOn:
    text: "Paste TikTok Link"
    optional: true
- inputText: "https://vt.tiktok.com/ZSaMj8uAJ/"
- waitForAnimationToEnd:
    timeout: 2000
# Note: Error categorization validation requires actual error scenarios
# This test validates the UI structure supports error categorization
# Inline submit button appears when URL is valid
- extendedWaitUntil:
    visible:
      id: "extract_script_button"
    timeout: 10000
    optional: true
