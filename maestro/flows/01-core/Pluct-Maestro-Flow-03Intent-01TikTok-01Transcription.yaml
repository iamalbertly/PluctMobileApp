appId: app.pluct
---
# Pluct-Maestro-Flow-03Intent-01TikTok-01Transcription.yaml
# Tests TikTok intent flow with pre-filled URL

- stopApp
- launchApp
- waitForAnimationToEnd:
    timeout: 5000
# Handle onboarding if present
- extendedWaitUntil:
    visible:
      text: "Get Transcripts in 3 Taps"
    timeout: 5000
    optional: true
- tapOn:
    text: "Next"
    optional: true
- waitForAnimationToEnd:
    timeout: 1500
- tapOn:
    text: "Got It"
    optional: true
- waitForAnimationToEnd:
    timeout: 1500
- tapOn:
    text: "I'll Figure It Out"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
# Wait for main screen
- extendedWaitUntil:
    visible:
      text: ".*Paste.*|.*credits.*"
    timeout: 10000
# Scroll to top to ensure URL input is visible
- scroll
# Wait for URL input field
- extendedWaitUntil:
    visible:
      text: "Paste TikTok Link"
    timeout: 10000
- extendedWaitUntil:
    visible:
      id: "url_input_field"
    timeout: 5000
    optional: true
# Tap on URL input
- tapOn:
    text: "Paste TikTok Link"
    optional: true
- tapOn:
    id: "url_input_field"
    optional: true
# Wait for field to be focused
- waitForAnimationToEnd:
    timeout: 1000
# Enter URL text
- inputText: "https://vt.tiktok.com/ZSaMj8uAJ/"
# Wait for text to be processed and inline submit button to appear
- waitForAnimationToEnd:
    timeout: 2000
# Wait for inline submit button (Send icon) to be visible inside input field
- extendedWaitUntil:
    visible:
      id: "extract_script_button"
    timeout: 10000
# Tap the inline submit button (now inside input field, Twitter-style)
- tapOn:
    id: "extract_script_button"
- waitForAnimationToEnd
# Script execution removed - use adb logcat monitoring instead
- waitForAnimationToEnd:
    timeout: 160000
- assertVisible:
    text: "transcript"
    optional: true
