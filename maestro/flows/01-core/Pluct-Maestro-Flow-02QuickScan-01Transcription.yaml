appId: app.pluct
---
# Pluct-Maestro-Flow-02QuickScan-01Transcription.yaml
# Tests Quick Scan transcription flow with TikTok URL

- clearState
- stopApp
- launchApp
- waitForAnimationToEnd:
    timeout: 5000
# Complete onboarding flow to reach main screen
- extendedWaitUntil:
    visible:
      text: "Get Transcripts in 3 Taps"
    timeout: 10000
    optional: true
- tapOn:
    text: "Next"
    optional: true
- waitForAnimationToEnd:
    timeout: 1500
- extendedWaitUntil:
    visible:
      text: "Find the Share Button"
    timeout: 5000
    optional: true
- tapOn:
    text: "Got It"
    optional: true
- waitForAnimationToEnd:
    timeout: 1500
- extendedWaitUntil:
    visible:
      text: "Ready to Try?"
    timeout: 5000
    optional: true
- tapOn:
    text: "I'll Figure It Out"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
# Wait for main screen - look for any indicator that main screen is ready
- extendedWaitUntil:
    visible:
      text: ".*credits.*|.*Pluct.*"
    timeout: 10000
    optional: true
# Try to find URL input by text placeholder first, then by id
- extendedWaitUntil:
    visible:
      text: ".*Paste.*"
    timeout: 10000
    optional: true
- tapOn:
    text: "Paste TikTok Link"
    optional: true
# Scroll to top to ensure URL input is visible
- scroll
# Wait for URL input field to be visible and tap to focus
- extendedWaitUntil:
    visible:
      id: "url_input_field"
    timeout: 10000
    optional: true
- tapOn:
    id: "url_input_field"
    optional: true
# Alternative: tap on placeholder text if ID fails
- tapOn:
    text: "Paste TikTok Link"
    optional: true
# Wait a bit for field to be focused
- waitForAnimationToEnd:
    timeout: 1000
# Enter URL text
- inputText: "https://vt.tiktok.com/ZSaMj8uAJ/"
# Wait for text to be processed and URL validation to complete
- waitForAnimationToEnd:
    timeout: 2000
# Wait for inline submit button (Send icon) to appear inside input field
- extendedWaitUntil:
    visible:
      id: "extract_script_button"
    timeout: 10000
# Tap the inline submit button (now inside input field, Twitter-style)
- tapOn:
    id: "extract_script_button"
- waitForAnimationToEnd
# Script execution removed - use adb logcat monitoring instead
- waitForAnimationToEnd:
    timeout: 160000
- assertVisible:
    text: "transcript"
    optional: true
- assertVisible:
    text: "Completed"
    optional: true
