appId: app.pluct
---
# Pluct-Maestro-Flow-01AppLaunch-01Validation.yaml
# Validates app launch and main screen elements

- stopApp
- launchApp
- waitForAnimationToEnd:
    timeout: 5000
- assertVisible:
    text: "Welcome to Pluct"
    optional: true
- assertVisible:
    text: "Credits:"
    optional: true
- assertVisible:
    text: "Settings"
    optional: true
- assertVisible:
    text: "Pluct"
    optional: true
# Script execution removed - use adb logcat monitoring instead
