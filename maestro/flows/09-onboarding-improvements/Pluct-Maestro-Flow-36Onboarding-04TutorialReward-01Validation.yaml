appId: app.pluct
---
# Pluct-Maestro-Flow-36Onboarding-04TutorialReward-01Validation.yaml
# Validates tutorial reward system with balance refresh and celebration
#
# Test Flow:
# 1. Clear app data (fresh install)
# 2. Complete welcome dialog
# 3. Progress through tutorial steps 1-3
# 4. Tap "Open TikTok" button
# 5. Verify balance refresh triggered
# 6. Verify celebration toast shown
# 7. Verify SharedPreferences flag set

- clearState
- launchApp
- waitForAnimationToEnd

# Dismiss welcome dialog
- extendedWaitUntil:
    visible:
      text: "Welcome"
    timeout: 8000
    optional: true
- tapOn:
    text: "Get Started"
    optional: true
- waitForAnimationToEnd

# Tutorial Step 1
- extendedWaitUntil:
    visible:
      text: "3 Taps"
    timeout: 5000
    optional: true
- tapOn:
    text: "Next"
    optional: true
- waitForAnimationToEnd:
    timeout: 1500

# Tutorial Step 2
- tapOn:
    text: "Got It"
    optional: true
- waitForAnimationToEnd:
    timeout: 1500

# Tutorial Step 3 - Complete tutorial
- extendedWaitUntil:
    visible:
      text: "Ready to Try"
    timeout: 3000
    optional: true
- tapOn:
    text: "Open TikTok"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

# Return to app (TikTok may have opened)
- launchApp:
    appId: app.pluct
- waitForAnimationToEnd:
    timeout: 2000

# Verify credit balance is visible (optimistic or real)
- assertVisible:
    text: ".*credit.*"
    optional: true

# Note: Tutorial completion and balance refresh are validated via logcat monitoring
# The PowerShell runner automatically captures and analyzes logcat patterns
