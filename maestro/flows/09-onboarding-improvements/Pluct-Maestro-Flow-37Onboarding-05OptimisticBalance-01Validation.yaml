appId: app.pluct
---
# Pluct-Maestro-Flow-37Onboarding-05OptimisticBalance-01Validation.yaml
# Validates optimistic balance loading (instant UI without blocking)
#
# Test Flow:
# 1. Clear app data
# 2. Launch app
# 3. Verify credit balance visible within 2 seconds (no loading spinner)
# 4. Verify UI is interactive immediately
# 5. Wait for background balance refresh
# 6. Verify balance updates if server returns different value

- clearState
- launchApp
- waitForAnimationToEnd:
    timeout: 1000

# Dismiss welcome dialog if shown (must be done first)
- tapOn:
    text: "Get Started"
    optional: true
- waitForAnimationToEnd:
    timeout: 1500

# Verify balance appears quickly (optimistic loading) - check for credit text or number
- extendedWaitUntil:
    visible:
      text: ".*credit.*|.*3.*"
    timeout: 2000

# Verify no loading spinner blocking UI
- assertNotVisible:
    id: ".*CircularProgressIndicator.*|.*loading.*|.*Loading.*"
    optional: true

# Verify app is interactive (can see header with credits)
- assertVisible:
    text: ".*credit.*|.*3.*"
    optional: true

# Wait for background balance refresh to complete
- waitForAnimationToEnd:
    timeout: 5000

# Note: Optimistic balance and background loading are validated via logcat monitoring
# The PowerShell runner automatically captures and analyzes these patterns
