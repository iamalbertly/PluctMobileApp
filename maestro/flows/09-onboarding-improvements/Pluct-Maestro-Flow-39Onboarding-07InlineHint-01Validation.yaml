appId: app.pluct
---
# Pluct-Maestro-Flow-39Onboarding-07InlineHint-01Validation.yaml
# Validates inline hint card for users who skip tutorial
#
# Test Flow:
# 1. Clear app data
# 2. Complete welcome
# 3. Skip tutorial at Step 3
# 4. Verify inline hint card visible on home screen
# 5. Tap "Show me how" button
# 6. Verify tutorial re-opens
# 7. Skip again
# 8. Tap X button to dismiss hint
# 9. Verify hint disappears
# 10. Verify SharedPreferences updated

- clearState
- launchApp
- waitForAnimationToEnd

# Complete welcome
- tapOn:
    text: "Get Started"
    optional: true
- waitForAnimationToEnd

# Progress through tutorial to Step 3
- tapOn:
    text: "Next"
    optional: true
- waitForAnimationToEnd:
    timeout: 1500
- tapOn:
    text: "Got It"
    optional: true
- waitForAnimationToEnd:
    timeout: 1500

# Skip tutorial
- tapOn:
    text: "I'll Figure It Out"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000

# Verify inline hint card is visible
- assertVisible:
    text: ".*Share any TikTok video.*"
    optional: true

# Verify "Show me how" button exists
- assertVisible:
    text: "Show me how"
    optional: true

# Tap "Show me how" to reopen tutorial
- tapOn:
    text: "Show me how"
    optional: true
- waitForAnimationToEnd:
    timeout: 1500

# Verify tutorial reopened
- assertVisible:
    text: "3 Taps"
    optional: true

# Skip tutorial again
- tapOn:
    text: "Next"
    optional: true
- waitForAnimationToEnd:
    timeout: 1000
- tapOn:
    text: "Got It"
    optional: true
- waitForAnimationToEnd:
    timeout: 1000
- tapOn:
    text: "I'll Figure It Out"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000

# Dismiss inline hint by tapping X button
- tapOn:
    id: ".*dismiss.*|.*close.*"
    optional: true
- waitForAnimationToEnd:
    timeout: 1000

# Verify hint is no longer visible
- assertNotVisible:
    text: "Show me how"
    optional: true

# Note: Inline hint dismissal is validated via logcat monitoring
# The PowerShell runner automatically captures hint state changes
